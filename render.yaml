services:
  - type: web
    name: nursego-backend
    env: node
    rootDir: nursego-backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: "3000"
      - key: JWT_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        value: "rzp_test_mockkey123456"
      - key: RAZORPAY_KEY_SECRET
        value: "secret123"

  - type: web
    name: nursego-frontend
    env: static
    rootDir: nursego-app
    buildCommand: npm install && npx expo export
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: EXPO_PUBLIC_API_URL
        fromService:
          type: web
          name: nursego-backend
          envVarKey: RENDER_EXTERNAL_URL
